<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЦТАИ АСУ ТП</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #0a0a0a;
            padding-top: env(safe-area-inset-top);
            color: #f4f4f5;
        }
        .tab-content { display: none; min-height: 80vh; }
        .tab-content.active { display: flex; flex-direction: column; }
        .card-bg { background-color: #111827; border-color: #1f2937; }

        /* Таблица графика */
        .schedule-container {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #1f2937;
            background-color: #0f172a;
            -webkit-overflow-scrolling: touch;
        }
        .schedule-table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; min-width: 1050px; }
        .schedule-table th, .schedule-table td {
            font-size: 10px; height: 42px; text-align: center; border-right: 1px solid #1e293b; border-bottom: 1px solid #1e293b; color: #cbd5e1;
            transition: all 0.1s ease;
        }
        .col-name { position: sticky; left: 0; z-index: 10; width: 130px; text-align: left !important; padding-left: 12px !important; background-color: #1e293b; color: #f8fafc !important; font-weight: 600; }
        thead th { background-color: #334155; color: #f8fafc; font-weight: 700; text-transform: uppercase; font-size: 9px; letter-spacing: 0.05em; }
        
        /* Цвета смен - КРИТИЧЕСКИ ВАЖНО */
        .shift-D { background-color: #059669 !important; color: white !important; } 
        .shift-N { background-color: #4f46e5 !important; color: white !important; } 
        .shift-S { background-color: #d97706 !important; color: white !important; } 
        .shift-O, .shift-ПХ { background-color: #1e293b !important; color: #64748b; font-size: 9px; } 

        /* ФИНАЛЬНОЕ ИСПРАВЛЕНИЕ ПОДСВЕТКИ */
        /* Делаем саму строку прозрачной, чтобы просвечивали цвета ячеек */
        .highlighted-row {
            outline: 2px solid #ffffff !important;
            outline-offset: -2px;
            z-index: 50;
            position: relative;
        }

        .highlighted-row td {
            background-color: transparent !important; /* Прозрачность для обычных ячеек */
            color: #ffffff !important;
            opacity: 1 !important;
            filter: none !important;
        }

        /* Исключаем перекрашивание ячеек со сменами внутри выделенной строки */
        .highlighted-row td.shift-D { background-color: #059669 !important; }
        .highlighted-row td.shift-N { background-color: #4f46e5 !important; }
        .highlighted-row td.shift-S { background-color: #d97706 !important; }

        .highlighted-row .col-name { 
            background-color: #3b82f6 !important; 
        }
        
        .blurred-row { 
            opacity: 0.1; 
            filter: grayscale(1) blur(0.5px);
        }

        /* Выбор месяца */
        .month-picker-btn {
            position: relative; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa; padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }
        .month-select-hidden { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* Навигация */
        .safe-nav { padding-bottom: env(safe-area-inset-bottom); height: calc(65px + env(safe-area-inset-bottom)); }
        .nav-btn { height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: all 0.3s; color: #71717a; }
        .nav-btn.active { color: #ffffff !important; }
        .nav-btn.active::before { 
            content: ''; position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; 
            background: rgba(59, 130, 246, 0.2); border-radius: 50%; transform: translate(-50%, -50%); 
            filter: blur(12px); z-index: -1; animation: pulse-glow 2s infinite;
        }
        .nav-text { font-size: 9px; font-weight: 800; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.02em; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body class="pb-32">

    <div class="max-w-xl mx-auto h-full relative">

        <div id="tab-home" class="tab-content active px-4 pt-10">
            <div class="flex flex-col items-center mb-12">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mb-4 border border-blue-500/20 shadow-2xl">
                    <span class="text-4xl">⚡</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">ЦТАИ АСУ ТП</h1>
                <p class="text-zinc-500 text-sm mt-2 font-medium text-center">Информационная панель <br> подразделения</p>
            </div>

            <div id="blocks-container" class="space-y-3 px-2"></div>
            
            <div class="px-2 mt-6 space-y-3">
                <button onclick="openBlockModal('other')" class="w-full bg-[#111827] border border-zinc-800 p-5 rounded-2xl flex items-center justify-between group active:scale-[0.97] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-500/10 text-amber-500 rounded-xl flex items-center justify-center text-xl">📌</div>
                        <span class="font-bold text-zinc-100 text-sm uppercase tracking-wide">Инструкции</span>
                    </div>
                    <span class="text-zinc-700">›</span>
                </button>
                <button onclick="openBlockModal('zip')" class="w-full bg-[#111827] border border-zinc-800 p-5 rounded-2xl flex items-center justify-between group active:scale-[0.97] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center text-xl">🔧</div>
                        <span class="font-bold text-zinc-100 text-sm uppercase tracking-wide">ЗИП АСУ ТП</span>
                    </div>
                    <span class="text-zinc-700">›</span>
                </button>
            </div>
        </div>

        <div id="tab-schedule" class="tab-content px-4 pt-10">
            <div class="flex flex-col items-center mb-8">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mb-4 border border-blue-500/20 shadow-2xl">
                    <span class="text-4xl">📅</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">График работы</h1>
            </div>

            <div class="flex items-center justify-end mb-6 px-2">
                <div class="month-picker-btn">
                    <span id="current-month-display">Апрель 2026</span>
                    <span>▼</span>
                    <select id="month-selector" class="month-select-hidden" onchange="renderSchedule(this.value)">
                        <option value="Январь">Январь</option><option value="Февраль">Февраль</option>
                        <option value="Март">Март</option><option value="Апрель" selected>Апрель</option>
                        <option value="Май">Май</option><option value="Июнь">Июнь</option>
                        <option value="Июль">Июль</option><option value="Август">Август</option>
                        <option value="Сентябрь">Сентябрь</option><option value="Октябрь">Октябрь</option>
                        <option value="Ноябрь">Ноябрь</option><option value="Декабрь">Декабрь</option>
                    </select>
                </div>
            </div>

            <div id="schedule-viewport" class="schedule-container shadow-2xl min-h-[300px]"></div>
            
            <div id="schedule-legend" class="mt-8 flex flex-wrap justify-center gap-x-8 gap-y-3 px-2 mb-20">
                <div class="flex items-center gap-2 text-[10px] text-zinc-400 font-bold uppercase tracking-widest"><div class="w-3 h-3 rounded-full bg-emerald-600"></div> День</div>
                <div class="flex items-center gap-2 text-[10px] text-zinc-400 font-bold uppercase tracking-widest"><div class="w-3 h-3 rounded-full bg-indigo-600"></div> Ночь</div>
                <div class="flex items-center gap-2 text-[10px] text-zinc-400 font-bold uppercase tracking-widest"><div class="w-3 h-3 rounded-full bg-amber-600"></div> Спец</div>
            </div>
        </div>

        <div id="tab-tests" class="tab-content px-4 pt-10">
            <div class="flex flex-col items-center mb-12">
                <div class="w-20 h-20 bg-indigo-600/10 rounded-3xl flex items-center justify-center mb-4 border border-indigo-500/20 shadow-2xl">
                    <span class="text-4xl">📋</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">Тесты знаний</h1>
            </div>
            <div class="px-6 py-16 bg-[#111827] border border-zinc-800 rounded-[2.5rem] shadow-2xl text-center">
                <p class="text-zinc-500 text-sm font-semibold uppercase tracking-widest">Раздел в разработке</p>
            </div>
        </div>

        <div id="tab-help" class="tab-content px-4 pt-10 flex-1">
            <div class="w-full flex flex-col items-center">
                <div class="text-center mb-12">
                    <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20 shadow-2xl">
                        <span class="text-4xl">🛠️</span>
                    </div>
                    <h2 class="text-3xl font-extrabold text-white tracking-tight">Поддержка</h2>
                </div>

                <div class="w-full space-y-3 px-2">
                    <a href="https://t.me/IlyaMar5hal" target="_blank" class="w-full bg-[#111827] border border-zinc-800 p-5 rounded-2xl flex items-center justify-between group active:scale-[0.97] transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-sky-500/20 text-sky-400 rounded-xl flex items-center justify-center text-2xl shadow-inner">✈️</div>
                            <div class="flex flex-col text-left"><span class="font-bold text-zinc-100 text-sm uppercase tracking-wide">Telegram</span></div>
                        </div>
                        <span class="text-zinc-700">›</span>
                    </a>
                    <a href="mailto:i.rygih@mail.ru" class="w-full bg-[#111827] border border-zinc-800 p-5 rounded-2xl flex items-center justify-between group active:scale-[0.97] transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-red-500/20 text-red-400 rounded-xl flex items-center justify-center text-2xl shadow-inner">📧</div>
                            <div class="flex flex-col text-left"><span class="font-bold text-zinc-100 text-sm uppercase tracking-wide">Почта</span></div>
                        </div>
                        <span class="text-zinc-700">›</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-zinc-900 max-w-xl mx-auto z-[100] safe-nav">
        <div class="flex h-full">
            <button id="nav-btn-0" onclick="switchTab(0)" class="flex-1 nav-btn active"><span class="text-2xl mb-1">🏠</span><span class="nav-text">Главная</span></button>
            <button id="nav-btn-1" onclick="switchTab(1)" class="flex-1 nav-btn"><span class="text-2xl mb-1">📅</span><span class="nav-text">График</span></button>
            <button id="nav-btn-2" onclick="switchTab(2)" class="flex-1 nav-btn"><span class="text-2xl mb-1">📝</span><span class="nav-text">Тесты</span></button>
            <button id="nav-btn-3" onclick="switchTab(3)" class="flex-1 nav-btn"><span class="text-2xl mb-1">⚙️</span><span class="nav-text">Помощь</span></button>
        </div>
    </nav>

    <div id="block-modal" onclick="if(event.target===this) closeBlockModal()" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[200] p-4">
        <div class="card-bg border border-zinc-800 rounded-[2.5rem] w-full max-w-md max-h-[75vh] flex flex-col overflow-hidden shadow-2xl">
            <div class="px-8 py-6 border-b border-zinc-800 flex items-center justify-between">
                <h3 id="modal-block-title" class="font-bold text-xl text-white"></h3>
                <button onclick="closeBlockModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-800 text-zinc-400">✕</button>
            </div>
            <div id="instructions-list" class="flex-1 overflow-auto p-6 space-y-3"></div>
        </div>
    </div>

    <script>
        let currentlyHighlighted = null;
        const monthsMap = { "Январь":0, "Февраль":1, "Март":2, "Апрель":3, "Май":4, "Июнь":5, "Июль":6, "Август":7, "Сентябрь":8, "Октябрь":9, "Ноябрь":10, "Декабрь":11 };

        function switchTab(index) {
            const tabs = ['tab-home', 'tab-schedule', 'tab-tests', 'tab-help'];
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabs[index]).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-btn-${index}`).classList.add('active');
            if(index === 1) renderSchedule(document.getElementById('month-selector').value);
            window.scrollTo(0, 0);
        }

        function highlightRow(row) {
            const rows = document.querySelectorAll('.schedule-table tbody tr');
            if (currentlyHighlighted === row) {
                rows.forEach(r => r.classList.remove('highlighted-row', 'blurred-row'));
                currentlyHighlighted = null;
            } else {
                rows.forEach(r => {
                    if (r === row) {
                        r.classList.add('highlighted-row');
                        r.classList.remove('blurred-row');
                    } else {
                        r.classList.add('blurred-row');
                        r.classList.remove('highlighted-row');
                    }
                });
                currentlyHighlighted = row;
            }
        }

        function renderSchedule(monthName) {
            document.getElementById('current-month-display').textContent = `${monthName} 2026`;
            const viewport = document.getElementById('schedule-viewport');
            const legend = document.getElementById('schedule-legend');
            viewport.innerHTML = '';
            const data = (typeof scheduleData !== 'undefined') ? scheduleData[monthName] : null;

            if (!data || !Array.isArray(data) || data.length === 0) {
                if (legend) legend.style.display = 'none';
                viewport.innerHTML = `<div class="py-32 text-center text-zinc-600 font-bold uppercase text-[11px] tracking-[0.2em] px-6">График отсутствует</div>`;
                return;
            }

            if (legend) legend.style.display = 'flex';
            const year = 2026, monthIdx = monthsMap[monthName];
            const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
            
            let html = `<table class="schedule-table"><thead><tr><th class="col-name">Ф.И.О.</th>`;
            const weekends = [];
            for(let d=1; d<=daysInMonth; d++) {
                const isWE = [0,6].includes(new Date(year, monthIdx, d).getDay());
                if(isWE) weekends.push(d);
                html += `<th class="${isWE ? 'bg-zinc-800/50 text-red-400' : ''}">${d}</th>`;
            }
            html += `<th>С</th><th>Ч</th></tr></thead><tbody>`;
            
            data.forEach(person => {
                html += `<tr onclick="highlightRow(this)"><td class="col-name font-medium">${person.name}</td>`;
                for(let d=1; d<=daysInMonth; d++) {
                    const val = person.shifts[d-1] || '';
                    const isVisual = ['D','N','S','O','ПХ'].includes(val);
                    // Добавляем класс shift-VAL напрямую ячейке
                    html += `<td class="shift-${val} ${weekends.includes(d) ? 'bg-white/5' : ''}">${(isVisual && !['O','ПХ'].includes(val)) ? '' : (val === 'W' ? '' : val)}</td>`;
                }
                html += `<td class="font-bold">${person.s}</td><td class="font-bold">${person.h}</td></tr>`;
            });
            viewport.innerHTML = html + `</tbody></table>`;
            currentlyHighlighted = null;
        }

        const blocksData = { 1: [{ name: "Руководство S7-400", file: "pdfs/blok-1/S7-400_instalation.pdf" }], 2: [], 3: [], 4: [], 5: [], 6: [], other: [], zip: [] };
        const blocksCont = document.getElementById('blocks-container');
        if(blocksCont) {
            for(let i=1; i<=6; i++) {
                blocksCont.innerHTML += `<button onclick="openBlockModal(${i})" class="w-full bg-[#111827] border border-zinc-800 p-5 rounded-2xl flex items-center justify-between group active:scale-[0.97] transition-all mb-1"><div class="flex items-center gap-4"><span class="text-blue-500 font-extrabold text-lg">0${i}</span><span class="font-bold text-zinc-100 text-sm uppercase tracking-wide">Блок ${i}</span></div><span class="text-zinc-700">›</span></button>`;
            }
        }

        function openBlockModal(key) {
            const data = blocksData[key] || [];
            document.getElementById('modal-block-title').textContent = key === 'other' ? 'Инструкции' : key === 'zip' ? 'ЗИП АСУ ТП' : `Блок ${key}`;
            const container = document.getElementById('instructions-list');
            container.innerHTML = data.length ? '' : '<div class="text-center py-10 text-zinc-600 text-sm uppercase tracking-widest">Пусто</div>';
            data.forEach(item => {
                container.innerHTML += `<div onclick="window.open('${item.file}', '_blank')" class="p-5 rounded-2xl bg-[#0f172a] border border-zinc-800 flex items-center gap-4 active:bg-blue-600 transition-colors cursor-pointer"><span class="text-2xl">📄</span><span class="font-bold text-xs text-zinc-100 uppercase tracking-wide">${item.name}</span></div>`;
            });
            document.getElementById('block-modal').classList.remove('hidden');
        }
        function closeBlockModal() { document.getElementById('block-modal').classList.add('hidden'); }
        window.onload = () => { renderSchedule("Апрель"); };
    </script>
</body>
</html>
