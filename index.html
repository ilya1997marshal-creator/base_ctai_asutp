<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЦТАИ АСУ ТП</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pb-32">

    <button onclick="toggleTheme()" class="theme-toggle" id="theme-icon">🌙</button>

    <div class="max-w-xl mx-auto min-h-screen relative px-4">
        <section id="tab-home" class="tab-content active pt-10">
            <div class="flex flex-col items-center mb-8 text-center">
                <div class="header-icon-main"><span>⚡</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">ЦТАИ АСУ ТП</h1>
                <p class="text-zinc-500 text-[11px] mt-2 font-extrabold uppercase tracking-[0.15em] italic opacity-80">Информационная панель подразделения</p>
            </div>

            <div id="on-duty-container" class="mb-6">
                <div class="bg-blue-600/5 border border-blue-500/10 rounded-3xl p-5">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-blue-500 text-[10px] font-black uppercase tracking-[0.2em]">На смене:</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                    </div>
                    <div id="duty-list" class="flex flex-wrap gap-2 text-sm font-bold"></div>
                </div>
            </div>

            <div id="blocks-container" class="space-y-3"></div>
            
            <div class="mt-6 space-y-3 pb-20">
                <button onclick="openBlockModal('other')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-500/10 text-amber-500 rounded-xl flex items-center justify-center text-xl">📌</div>
                        <span class="font-bold text-sm uppercase tracking-wide">Инструкции</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('zip')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center text-xl">🔧</div>
                        <span class="font-bold text-sm uppercase tracking-wide">ЗИП АСУ ТП</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content pt-10">
            <div class="flex flex-col items-center mb-8 text-center">
                <div class="header-icon-main"><span>📅</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">График</h1>
                <div class="mt-4 relative z-[50]">
                    <div class="month-picker-wrapper">
                        <span id="current-month-display">Апрель 2026</span>
                        <select id="month-selector" onchange="renderSchedule(this.value)">
                            <option value="Январь">Январь 2026</option>
                            <option value="Февраль">Февраль 2026</option>
                            <option value="Март">Март 2026</option>
                            <option value="Апрель" selected>Апрель 2026</option>
                            <option value="Май">Май 2026</option>
                            <option value="Июнь">Июнь 2026</option>
                            <option value="Июль">Июль 2026</option>
                            <option value="Август">Август 2026</option>
                            <option value="Сентябрь">Сентябрь 2026</option>
                            <option value="Октябрь">Октябрь 2026</option>
                            <option value="Ноябрь">Ноябрь 2026</option>
                            <option value="Декабрь">Декабрь 2026</option>
                        </select>
                        <span class="ml-2 text-[10px] opacity-40">▼</span>
                    </div>
                </div>
            </div>
            <div id="schedule-viewport" class="schedule-container shadow-2xl relative z-[10]"></div>
            <div class="mt-8 flex items-center justify-center gap-4 px-2 mb-24 overflow-x-auto whitespace-nowrap no-scrollbar">
                <div class="legend-badge"><div class="w-2.5 h-2.5 rounded-full bg-[#10b981]"></div><span>День</span></div>
                <div class="legend-badge"><div class="w-2.5 h-2.5 rounded-full bg-[#6366f1]"></div><span>Ночь</span></div>
                <div class="legend-badge"><div class="w-2.5 h-2.5 rounded-full bg-[#f59e0b]"></div><span>Спец</span></div>
                <div class="legend-badge"><div class="w-2.5 h-2.5 rounded-full bg-[#64748b] opacity-30"></div><span>Отпуск</span></div>
            </div>
        </section>

        <section id="tab-tests" class="tab-content pt-10">
            <div class="flex flex-col items-center mb-8 text-center">
                <div class="header-icon-main"><span>🎓</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">Тесты</h1>
            </div>
            <div class="w-full max-w-md mx-auto px-8 py-16 action-btn rounded-[3rem] border-dashed border-2 text-center opacity-50">
                <p class="text-zinc-400 text-xs font-black uppercase tracking-[0.2em]">В разработке</p>
            </div>
        </section>

        <section id="tab-help" class="tab-content pt-10">
            <div class="flex flex-col items-center mb-12 text-center">
                <div class="header-icon-main"><span>💬</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">Поддержка</h1>
                <p class="text-zinc-500 text-[10px] mt-2 font-bold uppercase tracking-widest opacity-60">Связь с разработчиком</p>
            </div>
            <div class="flex-1 flex flex-col justify-center items-center gap-6 w-full max-w-md mx-auto px-6 mb-20">
                <a href="https://t.me/IlyaMar5hal" target="_blank" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95] transition-transform">
                    <div class="help-icon text-3xl">✈️</div>
                    <span class="font-black text-sm uppercase tracking-widest">Telegram</span>
                </a>
                <a href="mailto:support@ctai.ru" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95] transition-transform">
                    <div class="help-icon text-3xl">📧</div>
                    <span class="font-black text-sm uppercase tracking-widest">Почта</span>
                </a>
                
                <div id="app-version" class="mt-4 text-[10px] font-black uppercase tracking-[0.3em] opacity-20">v.unknown</div>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-6 left-4 right-4 max-w-xl mx-auto z-[100] custom-nav shadow-2xl">
        <div class="flex h-full items-center justify-around px-2">
            <button onclick="switchTab(0)" id="nav-btn-0" class="nav-item active"><div class="nav-icon">🏠</div><span class="nav-label">Главная</span></button>
            <button onclick="switchTab(1)" id="nav-btn-1" class="nav-item"><div class="nav-icon">📅</div><span class="nav-label">График</span></button>
            <button onclick="switchTab(2)" id="nav-btn-2" class="nav-item"><div class="nav-icon">🎓</div><span class="nav-label">Тесты</span></button>
            <button onclick="switchTab(3)" id="nav-btn-3" class="nav-item"><div class="nav-icon">📡</div><span class="nav-label">Помощь</span></button>
        </div>
    </nav>

    <div id="block-modal" onclick="if(event.target===this) closeBlockModal()" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-end sm:items-center justify-center z-[200]">
        <div class="card-bg border-t sm:border rounded-t-[3rem] sm:rounded-[3rem] w-full max-w-md max-h-[85vh] flex flex-col">
            <div class="px-8 py-6 border-b flex items-center justify-between">
                <h3 id="modal-block-title" class="font-black text-xl uppercase tracking-tighter text-main"></h3>
                <button onclick="closeBlockModal()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-zinc-500/10 font-bold text-lg">✕</button>
            </div>
            <div id="instructions-list" class="flex-1 overflow-auto p-6 space-y-3"></div>
        </div>
    </div>

    <div id="update-toast" class="update-toast">
        <div class="update-toast-content">
            <div class="update-icon">🚀</div>
            <p class="update-title">Доступно обновление</p>
            <p class="update-desc">Перезагрузите для применения</p>
            <button id="update-btn" class="update-action-btn">ОБНОВИТЬ</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        let newWorker;
        let refreshing = false;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.update();

                    if (reg.waiting) {
                        newWorker = reg.waiting;
                        showUpdateBar();
                    }

                    reg.addEventListener('updatefound', () => {
                        newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateBar();
                            }
                        });
                    });
                });
            });

            function showUpdateBar() {
                const toast = document.getElementById('update-toast');
                if (toast) toast.classList.add('show');
            }

            document.getElementById('update-btn').addEventListener('click', () => {
                if (newWorker) {
                    newWorker.postMessage({ action: 'skipWaiting' });
                } else {
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
