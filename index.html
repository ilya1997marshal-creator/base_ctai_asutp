<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЦТАИ АСУ ТП</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pb-32">

    <button onclick="toggleTheme()" class="theme-toggle" id="theme-icon">🌙</button>

    <div class="max-w-xl mx-auto min-h-screen relative">

        <section id="tab-home" class="tab-content active px-4 pt-10">
            <div class="flex flex-col items-center mb-8 text-center">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mb-4 border border-blue-500/20 shadow-xl">
                    <span class="text-4xl">⚡</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">ЦТАИ АСУ ТП</h1>
                <p class="text-zinc-500 text-sm mt-2 font-medium">Информационная панель <br> подразделения</p>
            </div>

            <div id="on-duty-container" class="px-2 mb-6">
                <div class="bg-blue-600/5 border border-blue-500/20 rounded-2xl p-4">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-blue-500 text-xs font-black uppercase tracking-widest">Сейчас на смене:</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                    </div>
                    <div id="duty-list" class="flex flex-wrap gap-2 text-sm font-bold"></div>
                </div>
            </div>

            <div id="blocks-container" class="space-y-3 px-2"></div>
            
            <div class="px-2 mt-6 space-y-3">
                <button onclick="openBlockModal('other')" class="w-full action-btn p-5 rounded-2xl flex items-center justify-between active:scale-[0.97] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-500/10 text-amber-500 rounded-xl flex items-center justify-center text-xl">📌</div>
                        <span class="font-bold text-sm uppercase tracking-wide">Инструкции</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('zip')" class="w-full action-btn p-5 rounded-2xl flex items-center justify-between active:scale-[0.97] transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center text-xl">🔧</div>
                        <span class="font-bold text-sm uppercase tracking-wide">ЗИП АСУ ТП</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content px-2 pt-10">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-blue-600/10 rounded-3xl flex items-center justify-center mb-4 border border-blue-500/20">
                    <span class="text-3xl">📅</span>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">График работы</h1>
            </div>

            <div class="flex items-center justify-end mb-4 px-2">
                <div class="month-picker-btn">
                    <span id="current-month-display">Апрель 2026</span>
                    <span class="text-[10px] opacity-50">▼</span>
                    <select id="month-selector" class="month-select-hidden" onchange="renderSchedule(this.value)">
                        <option value="Январь">Январь</option>
                        <option value="Февраль">Февраль</option>
                        <option value="Март">Март</option>
                        <option value="Апрель" selected>Апрель</option>
                        <option value="Май">Май</option>
                        <option value="Июнь">Июнь</option>
                        <option value="Июль">Июль</option>
                        <option value="Август">Август</option>
                        <option value="Сентябрь">Сентябрь</option>
                        <option value="Октябрь">Октябрь</option>
                        <option value="Ноябрь">Ноябрь</option>
                        <option value="Декабрь">Декабрь</option>
                    </select>
                </div>
            </div>

            <div id="schedule-viewport" class="schedule-container shadow-lg"></div>
            
            <div class="mt-6 flex flex-wrap justify-center gap-x-6 gap-y-2 px-2 mb-20">
                <div class="flex items-center gap-2 text-[9px] text-zinc-500 font-bold uppercase tracking-widest"><div class="w-2.5 h-2.5 rounded-sm bg-emerald-600"></div> День</div>
                <div class="flex items-center gap-2 text-[9px] text-zinc-500 font-bold uppercase tracking-widest"><div class="w-2.5 h-2.5 rounded-sm bg-indigo-600"></div> Ночь</div>
                <div class="flex items-center gap-2 text-[9px] text-zinc-500 font-bold uppercase tracking-widest"><div class="w-2.5 h-2.5 rounded-sm bg-amber-600"></div> Спец</div>
            </div>
        </section>

        <section id="tab-tests" class="tab-content px-4 pt-10 min-h-screen">
            <div class="flex flex-col items-center justify-center py-20 text-center">
                <div class="w-20 h-20 bg-indigo-600/10 rounded-3xl flex items-center justify-center mb-6 border border-indigo-500/20 shadow-xl">
                    <span class="text-4xl">📋</span>
                </div>
                <h1 class="text-3xl font-extrabold mb-8">Тесты знаний</h1>
                <div class="w-full max-w-sm px-6 py-16 action-btn rounded-[2.5rem]">
                    <p class="text-zinc-500 text-sm font-semibold uppercase tracking-widest">Раздел в разработке</p>
                </div>
            </div>
        </section>

        <section id="tab-help" class="tab-content px-4 pt-10 min-h-screen">
            <div class="flex flex-col items-center justify-center py-20 text-center">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mb-6 border border-blue-500/20 shadow-xl">
                    <span class="text-4xl">📡</span>
                </div>
                <h2 class="text-3xl font-extrabold mb-10">Поддержка</h2>
                <div class="w-full grid grid-cols-1 gap-3 px-4 max-w-sm">
                    <a href="https://t.me/IlyaMar5hal" target="_blank" class="w-full action-btn py-6 rounded-3xl flex flex-col items-center justify-center">
                        <div class="w-14 h-14 bg-sky-500/10 text-sky-400 rounded-2xl flex items-center justify-center text-2xl mb-3">💬</div>
                        <span class="font-black text-sm uppercase tracking-widest">Telegram</span>
                    </a>
                    <a href="mailto:admin@ctai.pro" class="w-full action-btn py-6 rounded-3xl flex flex-col items-center justify-center">
                        <div class="w-14 h-14 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center text-2xl mb-3">✉️</div>
                        <span class="font-black text-sm uppercase tracking-widest">Почта</span>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto z-[100] safe-nav">
        <div class="flex h-full">
            <button onclick="switchTab(0)" id="nav-btn-0" class="flex-1 nav-btn active"><span>🏠</span><span class="nav-text">Главная</span></button>
            <button onclick="switchTab(1)" id="nav-btn-1" class="flex-1 nav-btn"><span>📅</span><span class="nav-text">График</span></button>
            <button onclick="switchTab(2)" id="nav-btn-2" class="flex-1 nav-btn"><span>📋</span><span class="nav-text">Тесты</span></button>
            <button onclick="switchTab(3)" id="nav-btn-3" class="flex-1 nav-btn"><span>🛠️</span><span class="nav-text">Помощь</span></button>
        </div>
    </nav>

    <div id="block-modal" onclick="if(event.target===this) closeBlockModal()" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
        <div class="card-bg border rounded-[2.5rem] w-full max-w-md max-h-[75vh] flex flex-col overflow-hidden shadow-2xl">
            <div class="px-8 py-6 border-b flex items-center justify-between">
                <h3 id="modal-block-title" class="font-bold text-xl"></h3>
                <button onclick="closeBlockModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-500/10">✕</button>
            </div>
            <div id="instructions-list" class="flex-1 overflow-auto p-6 space-y-3"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
