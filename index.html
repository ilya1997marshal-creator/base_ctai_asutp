<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="База ЦТАИ">
  
  <title>База данных ЦТАИ АСУ ТП</title>
  
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=11">
  <link rel="icon" type="image/png" href="apple-touch-icon.png?v=11">
  
  <link rel="stylesheet" href="styles.css?v=11">
  <script>
    // Мгновенная установка темы до загрузки страницы
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <button type="button" id="themeToggle" class="theme-toggle">
          <span class="sun-icon">☀️</span>
          <span class="moon-icon">🌙</span>
        </button>
      </div>
      <div class="header-inner">
        <h1 class="title">База данных ЦТАИ</h1>
        <p class="subtitle">АСУ ТП</p>
      </div>
    </header>

    <main class="main">
      <section class="panel">
        <nav class="blocks" id="tabs"></nav>
        
        <div class="support-area">
          <a href="mailto:i.rygih@mail.ru?subject=Поддержка: База ЦТАИ&body=Здравствуйте! У меня возникла проблема / есть предложение: %0D%0A%0D%0A" class="support-btn">
            <span class="support-icon">✉️</span> Написать в поддержку
          </a>
        </div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <div class="modal-head">
        <div style="width: 32px;"></div> <h2 id="modalTitle" class="modal-title"></h2>
        <button type="button" class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <ul id="modalList" class="modal-list"></ul>
      </div>
    </div>
  </div>

  <script src="app.js?v=11"></script>
</body>
</html>
