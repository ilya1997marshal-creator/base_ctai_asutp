<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЦТАИ АСУ ТП</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .bg-night-custom { background-color: #5d6dfa; }
        .bg-vacation-custom { background-color: #3f3f46; }
    </style>
</head>
<body class="pb-32">

    <button onclick="toggleTheme()" class="theme-toggle" id="theme-icon">🌙</button>

    <div class="max-w-xl mx-auto min-h-screen relative px-4">
        <section id="tab-home" class="tab-content active pt-10">
            <div class="flex flex-col items-center mb-6 text-center">
    <div class="flex items-center justify-center gap-2">
        <span class="text-2xl text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)]">⚡</span>
        <h1 class="text-2xl font-black tracking-tight text-glow" style="font-family: 'Inter', 'Manrope', sans-serif;">ЦТАИ АСУ ТП</h1>
    </div>
    <p class="text-zinc-500 text-[9px] mt-1 font-extrabold uppercase tracking-[0.2em] opacity-70">Информационная панель подразделения</p>
    <div id="current-date-display" class="mt-2 text-[11px] font-bold uppercase tracking-wider text-blue-400/70"></div>
</div>

            <div id="on-duty-container" class="mb-6 flex justify-center">
                <div class="bg-blue-600/5 border border-blue-500/10 rounded-3xl p-5 inline-block w-auto">
                    <div class="flex items-center justify-center gap-2 mb-4">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="text-blue-500 text-[10px] font-black uppercase tracking-[0.2em]">На смене:</span>
                    </div>
                    <div id="duty-list"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3 pb-20">
                <button onclick="openBlockModal('block_1')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-500 font-black italic text-xl w-10 text-center">01</span>
                        <span class="font-bold text-sm uppercase tracking-wide">Блок 1</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('block_2')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-500 font-black italic text-xl w-10 text-center">02</span>
                        <span class="font-bold text-sm uppercase tracking-wide">Блок 2</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('block_3')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-500 font-black italic text-xl w-10 text-center">03</span>
                        <span class="font-bold text-sm uppercase tracking-wide">Блок 3</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('block_4')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-500 font-black italic text-xl w-10 text-center">04</span>
                        <span class="font-bold text-sm uppercase tracking-wide">Блок 4</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('block_5')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-500 font-black italic text-xl w-10 text-center">05</span>
                        <span class="font-bold text-sm uppercase tracking-wide">Блок 5</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('block_6')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-500 font-black italic text-xl w-10 text-center">06</span>
                        <span class="font-bold text-sm uppercase tracking-wide">Блок 6</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>

                <button onclick="openBlockModal('siemens_diag')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97] border border-blue-500/20 bg-blue-500/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center text-xl">💻</div>
                        <span class="font-bold text-sm uppercase tracking-wide">Диагностика Siemens</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('other')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-500/10 text-amber-500 rounded-xl flex items-center justify-center text-xl">📌</div>
                        <span class="font-bold text-sm uppercase tracking-wide">Инструкции</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
                <button onclick="openBlockModal('zip')" class="w-full action-btn p-5 rounded-3xl flex items-center justify-between active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center text-xl">🔧</div>
                        <span class="font-bold text-sm uppercase tracking-wide">ЗИП АСУ ТП</span>
                    </div>
                    <span class="opacity-30">›</span>
                </button>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content pt-10">
            <div class="flex flex-col items-center mb-6 text-center">
                <div class="header-icon-main"><span>📅</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">График</h1>
                <div class="mt-4 relative z-[50]">
                    <div class="month-picker-wrapper">
                        <span id="current-month-display">Апрель 2026</span>
                        <select id="month-selector" onchange="renderSchedule(this.value)">
                            <option value="Январь">Январь 2026</option>
                            <option value="Февраль">Февраль 2026</option>
                            <option value="Март">Март 2026</option>
                            <option value="Апрель" selected>Апрель 2026</option>
                            <option value="Май">Май 2026</option>
                            <option value="Июнь">Июнь 2026</option>
                            <option value="Июль">Июль 2026</option>
                            <option value="Август">Август 2026</option>
                            <option value="Сентябрь">Сентябрь 2026</option>
                            <option value="Октябрь">Октябрь 2026</option>
                            <option value="Ноябрь">Ноябрь 2026</option>
                            <option value="Декабрь">Декабрь 2026</option>
                        </select>
                        <span class="ml-2 text-[10px] opacity-40">▼</span>
                    </div>
                </div>
            </div>
            
            <div id="schedule-viewport" class="schedule-container shadow-2xl relative z-[10]"></div>

            <div class="mt-4 flex flex-wrap justify-center gap-x-4 gap-y-2 px-2">
                <div class="flex items-center gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                    <span class="text-[9px] font-black uppercase opacity-40 tracking-tighter">День</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-night-custom"></div>
                    <span class="text-[9px] font-black uppercase opacity-40 tracking-tighter">Ночь</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                    <span class="text-[9px] font-black uppercase opacity-40 tracking-tighter">Спец</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-vacation-custom"></div>
                    <span class="text-[9px] font-black uppercase opacity-40 tracking-tighter">Отпуск</span>
                </div>
            </div>
        </section>

        <!-- ТЕСТЫ -->
        <section id="tab-tests" class="tab-content pt-10">
            <div class="flex flex-col items-center mb-6 text-center">
                <div class="header-icon-main"><span>🎓</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">Тесты</h1>
            </div>
            
            <!-- Экран списка тестов (первый уровень) -->
            <div id="test-list-screen" class="w-full max-w-md mx-auto px-4">
                <div class="grid grid-cols-1 gap-4">
                    <button id="pte-test-btn" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95] border border-blue-500/20 bg-blue-500/5">
                        <div class="text-4xl">📋</div>
                        <span class="font-black text-sm uppercase tracking-widest">Тестирование ПТЭ</span>
                        <span class="text-[10px] opacity-60 font-medium">166 вопросов</span>
                    </button>
                    <button id="fire-test-btn" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95] border border-red-500/20 bg-red-500/5">
                        <div class="text-4xl">🔥</div>
                        <span class="font-black text-sm uppercase tracking-widest">Пожарная Безопасность</span>
                        <span class="text-[10px] opacity-60 font-medium">63 вопроса</span>
                    </button>
                </div>
            </div>
            
            <!-- Экран выбора режима (второй уровень) -->
            <div id="test-mode-selector" class="hidden w-full max-w-md mx-auto px-4">
                <button id="back-to-test-list" class="mb-4 action-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center gap-1">
                    ← Назад к списку
                </button>
                <div class="grid grid-cols-1 gap-4">
                    <button id="start-exam-mode" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95] border border-blue-500/20 bg-blue-500/5">
                        <div class="text-4xl">📝</div>
                        <span class="font-black text-sm uppercase tracking-widest">Пробный экзамен</span>
                        <span class="text-[10px] opacity-60 font-medium">20 случайных вопросов, 2 ошибки допускается</span>
                    </button>
                    <button id="start-all-mode" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95]">
                        <div class="text-4xl">📚</div>
                        <span class="font-black text-sm uppercase tracking-widest">Все вопросы</span>
                        <span class="text-[10px] opacity-60 font-medium">Обучение с мгновенной проверкой</span>
                    </button>
                </div>
            </div>
            
            <!-- Экран прохождения теста -->
            <div id="test-runner" class="hidden w-full max-w-xl mx-auto px-2 pb-20">
                <div class="flex items-center justify-between mb-4">
                    <button id="exit-test" class="action-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">← Выйти</button>
                    <span class="text-xs font-bold opacity-60 uppercase tracking-wider"><span id="current-q-num">1</span>/<span id="total-q-num">20</span></span>
                    <div class="w-16"></div>
                </div>
                <div class="w-full h-1.5 bg-white/10 rounded-full mb-6">
                    <div id="test-progress" class="h-full bg-blue-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div id="question-card" class="action-btn p-6 rounded-3xl mb-4">
                    <div class="text-xs font-black uppercase tracking-wider text-blue-500/70 mb-3">Вопрос <span id="question-id-display">1</span></div>
                    <div id="question-text" class="text-sm font-medium leading-relaxed mb-4"></div>
                    <!-- Подсказка о количестве правильных ответов (для multiple) -->
                    <div id="multiple-hint" class="text-[10px] font-bold uppercase tracking-wider text-amber-500/80 mb-3"></div>
                    <div id="options-container" class="space-y-3"></div>
                </div>
                <div class="flex gap-3">
                    <button id="prev-question" class="flex-1 action-btn py-4 rounded-2xl font-bold text-sm uppercase tracking-wider disabled:opacity-30 disabled:pointer-events-none">← Назад</button>
                    <button id="next-question" class="flex-1 action-btn py-4 rounded-2xl font-bold text-sm uppercase tracking-wider bg-blue-500/20 border-blue-500/30">Далее →</button>
                </div>
                <button id="finish-test" class="hidden w-full mt-4 action-btn py-4 rounded-2xl font-bold text-sm uppercase tracking-wider bg-emerald-500/20 border-emerald-500/30 text-emerald-500">Завершить тест</button>
            </div>
            
            <!-- Экран результатов -->
            <div id="test-results" class="hidden w-full max-w-md mx-auto px-4 pb-20">
                <div class="action-btn p-8 rounded-[2.5rem] flex flex-col items-center">
                    <div id="result-icon" class="text-6xl mb-4"></div>
                    <h2 id="result-title" class="text-2xl font-black uppercase tracking-tight mb-2"></h2>
                    <p id="result-details" class="text-sm opacity-60 mb-6"></p>
                    <div class="w-full space-y-3">
                        <button id="review-mistakes" class="w-full action-btn py-4 rounded-2xl font-bold text-sm uppercase tracking-wider">Посмотреть ошибки</button>
                        <button id="back-to-mode" class="w-full action-btn py-4 rounded-2xl font-bold text-sm uppercase tracking-wider">К выбору теста</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-help" class="tab-content pt-10">
            <div class="flex flex-col items-center mb-8 text-center">
                <div class="header-icon-main"><span>📡</span></div>
                <h1 class="text-3xl font-extrabold tracking-tight">Поддержка</h1>
            </div>
            <div class="flex flex-col items-center justify-center gap-6 w-full max-w-md mx-auto px-6 mb-4 text-center">
                <a href="https://t.me/IlyaMar5hal" target="_blank" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95]">
                    <div class="text-4xl">🤖</div>
                    <span class="font-black text-sm uppercase tracking-widest">Telegram</span>
                </a>
                <a href="mailto:admin@ctai.ru" class="w-full action-btn p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 active:scale-[0.95]">
                    <div class="text-4xl">📨</div>
                    <span class="font-black text-sm uppercase tracking-widest">Email</span>
                </a>
                
                <button id="manual-update-check" class="w-full action-btn p-4 rounded-[2rem] flex flex-col items-center justify-center gap-2 active:scale-[0.95]">
                    <div class="text-2xl">📱</div>
                    <span class="font-black text-xs uppercase tracking-widest">Проверить обновления</span>
                </button>
            </div>
            <div class="text-center mt-2">
                <span class="text-[10px] font-black opacity-20 uppercase tracking-[0.5em]">Версия <span id="app-version">V85</span></span>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-6 left-4 right-4 max-w-xl mx-auto z-[100] custom-nav shadow-2xl">
        <div class="flex h-full items-center justify-around px-2">
            <button onclick="switchTab(0)" class="nav-item active"><div class="nav-icon">🏠</div><span class="nav-label">Главная</span></button>
            <button onclick="switchTab(1)" class="nav-item"><div class="nav-icon">📅</div><span class="nav-label">График</span></button>
            <button onclick="switchTab(2)" class="nav-item"><div class="nav-icon">🎓</div><span class="nav-label">Тесты</span></button>
            <button onclick="switchTab(3)" class="nav-item"><div class="nav-icon">📡</div><span class="nav-label">Помощь</span></button>
        </div>
    </nav>

    <div id="block-modal" onclick="if(event.target===this) closeBlockModal()" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-end sm:items-center justify-center z-[200]">
        <div class="card-bg border-t sm:border rounded-t-[3rem] sm:rounded-[3rem] w-full max-w-md max-h-[85vh] flex flex-col">
            <div class="px-8 py-6 border-b flex items-center justify-between">
                <h3 id="modal-block-title" class="font-black text-xl uppercase tracking-tighter text-main"></h3>
                <button onclick="closeBlockModal()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-zinc-500/10 font-bold text-lg">✕</button>
            </div>
            <div id="instructions-list" class="flex-1 overflow-auto p-6 space-y-3"></div>
        </div>
    </div>

    <div class="update-toast">
        <div class="text-lg mb-2">✨ Доступна новая версия</div>
        <div class="text-sm opacity-60 mb-4">Обновите приложение для улучшения работы</div>
        <button class="update-action-btn">Обновить сейчас</button>
    </div>

    <script src="data.js"></script>
    <script src="questions.js"></script>
    <script src="questions-fire.js"></script>
    <script src="app.js"></script>
</body>
</html>
