<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЦТАИ АСУ ТП</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #0a0a0a;
            padding-top: env(safe-area-inset-top);
        }
        .tab-content { display: none; min-height: 80vh; }
        .tab-content.active { display: flex; flex-direction: column; }
        .card-bg { background-color: #111827; border-color: #334155; }

        .schedule-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #1e1e1e;
            background-color: #0f172a;
            -webkit-overflow-scrolling: touch;
            min-height: 200px;
        }
        .schedule-table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; min-width: 1050px; }
        .schedule-table th, .schedule-table td {
            font-size: 10px; height: 38px; text-align: center; vertical-align: middle; 
            border-right: 1px solid #1e293b; border-bottom: 1px solid #1e293b; color: #cbd5e1;
        }
        .col-name { 
            position: sticky; left: 0; z-index: 10; width: 130px; text-align: left !important; 
            padding-left: 10px !important; background-color: #1e293b; font-size: 11px !important; color: #f8fafc !important;
        }
        thead th { background-color: #334155; color: #f8fafc; font-weight: 600; text-transform: uppercase; font-size: 9px; }
        thead th.col-name { z-index: 20; background-color: #2563eb; }

        .shift-D { background-color: #059669 !important; color: transparent !important; } 
        .shift-N { background-color: #4f46e5 !important; color: transparent !important; } 
        .shift-S { background-color: #d97706 !important; color: transparent !important; } 
        .shift-O, .shift-ПХ { background-color: #1e293b !important; color: #64748b; font-size: 9px; } 
        
        .weekend-cell { background-color: rgba(255, 255, 255, 0.03); }
        thead th.weekend-cell { background-color: #1e293b !important; color: #ef4444 !important; }

        tr.highlighted-row td:not([class*="shift-D"]):not([class*="shift-N"]):not([class*="shift-S"]) { 
            background-color: #1e293b !important; 
        }
        tr.highlighted-row td { opacity: 1 !important; filter: none !important; }
        .blurred-row { opacity: 0.15; filter: blur(1.5px) grayscale(0.8); pointer-events: none; }

        .month-picker-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .month-select { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 10; }

        .safe-nav { padding-bottom: env(safe-area-inset-bottom); height: calc(65px + env(safe-area-inset-bottom)); }
        
        /* --- КРАСИВАЯ АНИМАЦИЯ ТАББАРА --- */
        .nav-btn { 
            height: 65px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #71717a; /* Серый для неактивных */
            overflow: hidden;
        }
        
        /* Синий blob-фон за иконкой (скрыт по умолчанию) */
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background-color: rgba(59, 130, 246, 0.15); /* Очень прозрачный синий */
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: blur(10px);
            z-index: -1;
        }

        /* Текст под иконкой */
        .nav-text {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* --- АКТИВНОЕ СОСТОЯНИЕ --- */
        .nav-btn.active {
            color: #ffffff !important; /* Белый текст и иконка */
        }

        /* Показываем пульсирующий blob */
        .nav-btn.active::before {
            transform: translate(-50%, -50%) scale(1);
            animation: pulse-glow 2s infinite;
        }

        /* Стилизация активной иконки */
        .nav-btn.active span:first-child {
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
            transform: translateY(-2px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Сдвигаем текст немного вниз */
        .nav-btn.active .nav-text {
            transform: translateY(1px);
        }

        /* Ключевые кадры для пульсации свечения */
        @keyframes pulse-glow {
            0% {
                background-color: rgba(59, 130, 246, 0.15);
                filter: blur(10px);
            }
            50% {
                background-color: rgba(59, 130, 246, 0.25);
                filter: blur(12px);
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                background-color: rgba(59, 130, 246, 0.15);
                filter: blur(10px);
            }
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-100 min-h-screen pb-32">

    <div class="max-w-xl mx-auto h-full relative">

        <div id="tab-home" class="tab-content active px-4 pt-8">
            <div class="flex flex-col items-center mb-10">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-lg mb-4">Ц</div>
                <h1 class="text-2xl font-bold tracking-tight text-center">ЦТАИ АСУ ТП</h1>
            </div>
            <div id="blocks-container" class="space-y-2 px-1"></div>
            <div class="px-1 mt-4 space-y-2">
                <button onclick="openBlockModal('other')" class="w-full card-bg border border-zinc-800 rounded-2xl p-4 flex items-center justify-between text-zinc-200 active:scale-[0.98]">
                    <div class="flex items-center gap-4"><span>📌</span><span class="font-medium">Общие инструкции</span></div><span>›</span>
                </button>
                <button onclick="openBlockModal('zip')" class="w-full card-bg border border-zinc-800 rounded-2xl p-4 flex items-center justify-between text-zinc-200 active:scale-[0.98]">
                    <div class="flex items-center gap-4"><span>🔧</span><span class="font-medium">ЗИП АСУ ТП</span></div><span>›</span>
                </button>
            </div>
        </div>

        <div id="tab-schedule" class="tab-content px-2 pt-6">
            <div class="flex items-center justify-between px-2 mb-4">
                <h2 class="text-xl font-bold">График работы</h2>
                <div class="month-picker-wrapper bg-blue-600/20 text-blue-400 text-[10px] px-3 py-1.5 rounded-full font-bold uppercase tracking-wider">
                    <span id="current-month-display">Апрель 2026</span> <span>▼</span>
                    <select id="month-selector" class="month-select" onchange="renderSchedule(this.value)">
                        <option value="Январь">Январь</option><option value="Февраль">Февраль</option>
                        <option value="Март">Март</option><option value="Апрель" selected>Апрель</option>
                        <option value="Май">Май</option><option value="Июнь">Июнь</option>
                        <option value="Июль">Июль</option><option value="Август">Август</option>
                        <option value="Сентябрь">Сентябрь</option><option value="Октябрь">Октябрь</option>
                        <option value="Ноябрь">Ноябрь</option><option value="Декабрь">Декабрь</option>
                    </select>
                </div>
            </div>
            <div id="schedule-viewport" class="schedule-container shadow-2xl"></div>
            <div id="schedule-legend" class="mt-6 flex flex-wrap justify-center gap-x-6 gap-y-2 px-2 mb-20">
                <div class="flex items-center gap-2 text-[10px] text-zinc-400 font-bold uppercase"><div class="w-3 h-3 rounded-sm bg-emerald-600"></div> День</div>
                <div class="flex items-center gap-2 text-[10px] text-zinc-400 font-bold uppercase"><div class="w-3 h-3 rounded-sm bg-indigo-600"></div> Ночь</div>
                <div class="flex items-center gap-2 text-[10px] text-zinc-400 font-bold uppercase"><div class="w-3 h-3 rounded-sm bg-amber-600"></div> Спец</div>
            </div>
        </div>

        <div id="tab-tests" class="tab-content px-4 pt-8 text-center flex-1 justify-center">
            <div class="card-bg border border-zinc-800 rounded-3xl p-10"><h2 class="text-xl font-bold">Тесты знаний</h2><p class="text-zinc-400 text-sm">В разработке...</p></div>
        </div>

        <div id="tab-help" class="tab-content px-6 flex-1 items-center justify-center">
            <div class="w-full max-w-[280px]">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold mb-1">Помощь</h2>
                </div>
                <div class="space-y-4">
                    <a href="https://t.me/IlyaMar5hal" target="_blank" class="w-full card-bg border border-zinc-800 py-5 rounded-2xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all shadow-xl">
                        <div class="w-10 h-10 bg-sky-500/10 text-sky-500 rounded-full flex items-center justify-center text-xl">✈️</div>
                        <span class="font-bold text-zinc-100 uppercase tracking-widest text-[10px]">Telegram</span>
                    </a>
                    <a href="mailto:i.rygih@mail.ru" class="w-full card-bg border border-zinc-800 py-5 rounded-2xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all shadow-xl">
                        <div class="w-10 h-10 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center text-xl">📧</div>
                        <span class="font-bold text-zinc-100 uppercase tracking-widest text-[10px]">Почта</span>
                    </a>
                </div>
                <p class="text-center text-[10px] text-zinc-700 mt-12 uppercase tracking-widest font-black">Версия 1.2.6</p>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-zinc-800 max-w-xl mx-auto z-[100] safe-nav">
        <div class="flex h-full">
            <button id="nav-btn-0" onclick="switchTab(0)" class="flex-1 nav-btn active"><span class="text-2xl mb-1">🏠</span><span class="nav-text">Главная</span></button>
            <button id="nav-btn-1" onclick="switchTab(1)" class="flex-1 nav-btn"><span class="text-2xl mb-1">📅</span><span class="nav-text">График</span></button>
            <button id="nav-btn-2" onclick="switchTab(2)" class="flex-1 nav-btn"><span class="text-2xl mb-1">📝</span><span class="nav-text">Тесты</span></button>
            <button id="nav-btn-3" onclick="switchTab(3)" class="flex-1 nav-btn"><span class="text-2xl mb-1">⚙️</span><span class="nav-text">Помощь</span></button>
        </div>
    </nav>

    <div id="block-modal" onclick="if(event.target===this) closeBlockModal()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
        <div class="card-bg border border-zinc-800 rounded-[2rem] w-full max-w-md max-h-[70vh] flex flex-col overflow-hidden">
            <div class="px-6 py-5 border-b border-zinc-800 flex items-center justify-between"><h3 id="modal-block-title" class="font-bold text-lg"></h3><button onclick="closeBlockModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-800 text-zinc-400">✕</button></div>
            <div id="instructions-list" class="flex-1 overflow-auto p-4 space-y-2"></div>
        </div>
    </div>

    <script>
        let currentlyHighlighted = null;
        const monthsMap = { "Январь":0, "Февраль":1, "Март":2, "Апрель":3, "Май":4, "Июнь":5, "Июль":6, "Август":7, "Сентябрь":8, "Октябрь":9, "Ноябрь":10, "Декабрь":11 };

        function switchTab(index) {
            const tabs = ['tab-home', 'tab-schedule', 'tab-tests', 'tab-help'];
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabs[index]).classList.add('active');
            
            // Логика подсветки меню
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-btn-${index}`).classList.add('active');

            if(index === 1) renderSchedule(document.getElementById('month-selector').value);
            window.scrollTo(0, 0);
        }

        function highlightRow(row) {
            const rows = document.querySelectorAll('#schedule-table tbody tr');
            if (currentlyHighlighted === row) {
                rows.forEach(r => r.classList.remove('highlighted-row', 'blurred-row'));
                currentlyHighlighted = null;
            } else {
                rows.forEach(r => {
                    if (r === row) { r.classList.add('highlighted-row'); r.classList.remove('blurred-row'); }
                    else { r.classList.add('blurred-row'); r.classList.remove('highlighted-row'); }
                });
                currentlyHighlighted = row;
            }
        }

        function renderSchedule(monthName) {
            document.getElementById('current-month-display').textContent = `${monthName} 2026`;
            const viewport = document.getElementById('schedule-viewport');
            const legend = document.getElementById('schedule-legend');
            viewport.innerHTML = '';
            
            const data = (typeof scheduleData !== 'undefined') ? scheduleData[monthName] : null;

            if (!data || !Array.isArray(data) || data.length === 0) {
                if (legend) legend.style.display = 'none';
                const archivedMonths = ["Январь", "Февраль", "Март"];
                let message = archivedMonths.includes(monthName) 
                    ? "График в архиве,<br>смены закрыты" 
                    : "График на утверждении<br>или в разработке";

                viewport.innerHTML = `<div class="py-24 text-center text-zinc-500 font-bold uppercase text-[11px] tracking-widest px-6 leading-relaxed">${message}</div>`;
                return;
            }

            if (legend) legend.style.display = 'flex';
            const year = 2026;
            const monthIdx = monthsMap[monthName];
            const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

            let html = `<table id="schedule-table" class="schedule-table"><thead><tr><th class="col-name">Ф.И.О.</th>`;
            const weekends = [];
            for(let d=1; d<=daysInMonth; d++) {
                const dayOfWeek = new Date(year, monthIdx, d).getDay();
                const isWE = (dayOfWeek === 0 || dayOfWeek === 6);
                if(isWE) weekends.push(d);
                html += `<th class="${isWE ? 'weekend-cell' : ''}">${d}</th>`;
            }
            html += `<th>С</th><th>Ч</th></tr></thead><tbody>`;

            data.forEach(person => {
                html += `<tr onclick="highlightRow(this)"><td class="col-name font-medium">${person.name}</td>`;
                for(let d=1; d<=daysInMonth; d++) {
                    const val = person.shifts[d-1] || '';
                    const isWE = weekends.includes(d);
                    const isVisualShift = (val === 'D' || val === 'N' || val === 'S' || val === 'O' || val === 'ПХ');
                    const displayVal = isVisualShift && val !== 'O' && val !== 'ПХ' ? '' : (val === 'W' ? '' : val);
                    html += `<td class="shift-${val} ${isWE ? 'weekend-cell' : ''}">${displayVal}</td>`;
                }
                html += `<td class="font-bold">${person.s}</td><td class="font-bold">${person.h}</td></tr>`;
            });
            viewport.innerHTML = html + `</tbody></table>`;
            currentlyHighlighted = null;
        }

        const blocksData = { 
            1: [{ name: "S7-400 Installation (PDF)", file: "pdfs/blok-1/S7-400_instalation.pdf" }], 
            2: [], 3: [], 4: [], 5: [], 6: [], other: [], zip: [] 
        };

        const blocksCont = document.getElementById('blocks-container');
        if(blocksCont) {
            for(let i=1; i<=6; i++) {
                blocksCont.innerHTML += `<button onclick="openBlockModal(${i})" class="w-full card-bg border border-zinc-800 rounded-2xl p-4 flex items-center justify-between mb-2 text-zinc-200 font-medium active:scale-95 transition-transform"><div class="flex items-center gap-4"><span class="text-blue-500 font-bold text-lg">0${i}</span>Блок ${i}</div><span>›</span></button>`;
            }
        }

        function openBlockModal(key) {
            const data = blocksData[key] || [];
            document.getElementById('modal-block-title').textContent = key === 'other' ? 'Инструкции' : key === 'zip' ? 'ЗИП АСУ ТП' : `Блок ${key}`;
            const container = document.getElementById('instructions-list');
            container.innerHTML = (data && data.length) ? '' : '<div class="text-center py-10 text-zinc-500 text-sm">Раздел пуст</div>';
            if(data) data.forEach(item => {
                container.innerHTML += `<div onclick="window.open('${item.file}', '_blank')" class="p-4 rounded-xl card-bg border border-zinc-800 flex items-center gap-4 active:bg-zinc-800 transition-colors cursor-pointer"><span class="text-xl">📄</span><span class="font-medium text-xs text-zinc-100">${item.name}</span></div>`;
            });
            document.getElementById('block-modal').classList.remove('hidden');
        }
        function closeBlockModal() { document.getElementById('block-modal').classList.add('hidden'); }
        
        window.onload = () => { renderSchedule("Апрель"); };
    </script>
</body>
</html>
